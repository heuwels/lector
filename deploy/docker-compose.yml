services:
  afrikaans-reader:
    image: ghcr.io/3stacks/afrikaans-reader:${AFRIKAANS_READER_VERSION:-latest}
    container_name: afrikaans-reader
    restart: unless-stopped
    volumes:
      - ${DATA_PATH:-./data}:/app/data
    ports:
      - "${WEB_PORT:-3400}:3000"
    environment:
      - NODE_ENV=production
      - DATA_DIR=/app/data
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
