services:
  ollama:
    image: ollama/ollama:latest
    container_name: lector-ollama
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama
    # Uncomment for GPU passthrough:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - capabilities: [gpu]

  lector:
    image: ghcr.io/heuwels/lector:${LECTOR_VERSION:-latest}
    container_name: lector
    restart: unless-stopped
    depends_on:
      - ollama
    volumes:
      - ${DATA_PATH:-./data}:/app/data
    ports:
      - "${WEB_PORT:-3400}:3000"
      # The Hono API is published on a fixed host :3457; the browser is told
      # where to reach it via API_URL below (which carries host + port).
      - "3457:3457"
    environment:
      - NODE_ENV=production
      - DATA_DIR=/app/data
      # Deployment mode — selfhost (default) or cloud. Cloud refuses to boot
      # until accounts/auth ship (#218; seam tracked in #242).
      - LECTOR_MODE=${LECTOR_MODE:-selfhost}
      # Browser-facing API origin — the web app calls Hono directly, so this
      # must be reachable FROM THE BROWSER (the host/port you open the app on),
      # not an internal Docker name. Injected into /__env.js at startup. Unset →
      # falls back to http://localhost:3457 (only correct when browsing locally).
      - API_URL=${API_URL:-}
      - LLM_PROVIDER=${LLM_PROVIDER:-anthropic}
      # OpenAI-compatible backend — points at the bundled ollama service by default.
      - OPENAI_COMPAT_URL=${OPENAI_COMPAT_URL:-http://ollama:11434}
      - OPENAI_COMPAT_MODEL=${OPENAI_COMPAT_MODEL:-llama3.1:8b}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - CLAUDE_OAUTH_TOKEN=${CLAUDE_OAUTH_TOKEN:-}
      # Error tracking + tracing (optional). One DSN covers the API and, via
      # /__env.js, the browser. Point it at Sentry.io, self-hosted Sentry, or
      # GlitchTip. Unset → Sentry stays off.
      - SENTRY_DSN=${SENTRY_DSN:-}
      - SENTRY_TRACES_SAMPLE_RATE=${SENTRY_TRACES_SAMPLE_RATE:-}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  ollama-data:
