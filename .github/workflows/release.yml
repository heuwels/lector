name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build

  e2e-tests:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - uses: oven-sh/setup-bun@v2
      - run: npm ci
      - run: cd api && bun install
      - name: Load dictionary pin
        run: grep -v '^#' dict.env >> "$GITHUB_ENV"
      - name: Fetch on-device dictionary
        run: |
          mkdir -p data
          curl -fL --retry 3 \
            "https://github.com/heuwels/lector/releases/download/${DICT_VERSION}/dictionary-af.db" \
            -o data/dictionary-af.db
          echo "${DICT_SHA256}  data/dictionary-af.db" | sha256sum -c -
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  build-amd64:
    runs-on: ubuntu-latest
    needs: [lint, typecheck, build, e2e-tests]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/heuwels/lector:sha-${{ github.sha }}-amd64
          platforms: linux/amd64
          # Build context has no .git (see .dockerignore); on a release the tag
          # IS the version. BUILD_TIME is stamped by next.config; branch is left
          # unset (a tag build is detached → the About panel hides the Branch row).
          build-args: |
            APP_VERSION=${{ github.ref_name }}
            GIT_COMMIT=${{ github.sha }}
          cache-from: type=registry,ref=ghcr.io/heuwels/lector:buildcache-amd64
          cache-to: type=registry,ref=ghcr.io/heuwels/lector:buildcache-amd64,mode=max,ignore-error=true

  build-arm64:
    runs-on: ubuntu-24.04-arm
    needs: [lint, typecheck, build, e2e-tests]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/heuwels/lector:sha-${{ github.sha }}-arm64
          platforms: linux/arm64
          # Build context has no .git (see .dockerignore); on a release the tag
          # IS the version. BUILD_TIME is stamped by next.config; branch is left
          # unset (a tag build is detached → the About panel hides the Branch row).
          build-args: |
            APP_VERSION=${{ github.ref_name }}
            GIT_COMMIT=${{ github.sha }}
          cache-from: type=registry,ref=ghcr.io/heuwels/lector:buildcache-arm64
          cache-to: type=registry,ref=ghcr.io/heuwels/lector:buildcache-arm64,mode=max,ignore-error=true

  merge:
    runs-on: ubuntu-latest
    needs: [build-amd64, build-arm64]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/heuwels/lector
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - name: Create multi-arch manifest
        run: |
          TAG_ARGS=""
          while IFS= read -r TAG; do
            TAG_ARGS="$TAG_ARGS -t $TAG"
          done <<< "${{ steps.meta.outputs.tags }}"
          docker buildx imagetools create $TAG_ARGS \
            ghcr.io/heuwels/lector:sha-${{ github.sha }}-amd64 \
            ghcr.io/heuwels/lector:sha-${{ github.sha }}-arm64
