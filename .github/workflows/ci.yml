name: CI

on:
  pull_request:
    branches: [master]
  # Direct pushes to master publish a Docker image (docker.yml) — run the same
  # gates there so an image sha never ships without a green suite next to it
  # (DX-02). True *blocking* requires a branch-protection rule; this gives the
  # signal.
  push:
    branches: [master]

jobs:
  deployment-script-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Validate gated deployment and rollback
        run: bash deploy/cloud/deploy-cloud.test.sh

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Fetch on-device dictionaries
        # dictionary-db.test.ts is an integration test over the real (gitignored)
        # dictionaries — without this the whole vitest run fails in beforeAll.
        # Sources dict.env and pulls every language listed in DICT_LANGS.
        run: |
          set -a; . ./dict.env; set +a
          mkdir -p data
          for L in $DICT_LANGS; do
            U=$(echo "$L" | tr a-z A-Z)
            ver="DICT_VERSION_$U"; sha="DICT_SHA256_$U"
            curl -fL --retry 3 \
              "https://github.com/heuwels/lector/releases/download/${!ver}/dictionary-${L}.db" \
              -o "data/dictionary-${L}.db"
            echo "${!sha}  data/dictionary-${L}.db" | sha256sum -c -
          done
      - run: npm test
      - name: Verify starter content
        # Packs that ship a starter series (#317) must stay verifier-clean:
        # band discipline, every token dictionary-resolvable, and ≥90% of the
        # top-1,000 introduced. Skips languages without a starter manifest.
        run: |
          set -a; . ./dict.env; set +a
          for L in $DICT_LANGS; do
            if [ -f "languages/$L/content/starter/manifest.json" ]; then
              npx tsx scripts/verify-starter-content.ts --lang "$L" --require-coverage 90
            fi
          done

  api-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
        working-directory: api
      - name: Typecheck API
        run: bun run typecheck
        working-directory: api
      # bun run test, not bare bun test — the script isolates DATA_DIR
      - run: bun run test
        working-directory: api

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build

  e2e-tests:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - uses: oven-sh/setup-bun@v2
      - run: npm ci
      - run: cd api && bun install --frozen-lockfile
      - name: Fetch on-device dictionaries
        # The dictionaries are gitignored — they ship in the Docker image. For CI
        # the dev server needs a copy at data/dictionary-<lang>.db so e2e tests
        # that assert the "on-device" lookup path actually find a hit.
        run: |
          set -a; . ./dict.env; set +a
          mkdir -p data
          for L in $DICT_LANGS; do
            U=$(echo "$L" | tr a-z A-Z)
            ver="DICT_VERSION_$U"; sha="DICT_SHA256_$U"
            curl -fL --retry 3 \
              "https://github.com/heuwels/lector/releases/download/${!ver}/dictionary-${L}.db" \
              -o "data/dictionary-${L}.db"
            echo "${!sha}  data/dictionary-${L}.db" | sha256sum -c -
          done
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # The dev-mode e2e job above exercises `next dev` + Bun from source. This one
  # runs the same suite against the production artifact — the standalone Next
  # build + docker-entrypoint.sh (both servers in one container) — so standalone
  # packaging and the browser→Hono direct calls are covered before a release
  # image is ever cut (#110, #188).
  e2e-docker:
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - uses: docker/setup-buildx-action@v3
      # Registry build cache is shared across branches (unlike type=gha, which is
      # branch-isolated), so this PR build populates the cache that docker.yml's
      # publish build on master then reuses — no second from-scratch image build.
      # Fork PRs can't push to ghcr: skip the login; cache-to then fails soft
      # (ignore-error) and cache-from simply misses.
      - name: Log in to ghcr (build cache)
        # Same-repo PRs and pushes to master can write the cache; fork PRs
        # can't push to ghcr — skip login, cache-to fails soft (ignore-error).
        if: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build production image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          push: false
          tags: lector:e2e
          platforms: linux/amd64
          cache-from: type=registry,ref=ghcr.io/heuwels/lector:buildcache-amd64
          cache-to: type=registry,ref=ghcr.io/heuwels/lector:buildcache-amd64,mode=max,ignore-error=true
      - name: Cloud mode without a secret refuses to boot (fail-closed guard, #242/#218)
        # LECTOR_MODE=cloud runs built-in accounts (#218) and must exit
        # non-zero without BETTER_AUTH_SECRET — never sign sessions with the
        # library's default secret. Also pins the message so the guard can't
        # silently rot.
        run: |
          set +e
          OUT=$(docker run --rm -e LECTOR_MODE=cloud lector:e2e 2>&1)
          CODE=$?
          set -e
          echo "$OUT"
          if [ "$CODE" -eq 0 ]; then
            echo "Expected non-zero exit for LECTOR_MODE=cloud without BETTER_AUTH_SECRET, got success" >&2
            exit 1
          fi
          echo "$OUT" | grep -q "LECTOR_MODE=cloud requires BETTER_AUTH_SECRET"

      - name: Cloud proper boots with a secret and requires auth (#218)
        # The other half of the guard: cloud + BETTER_AUTH_SECRET must boot,
        # report its mode via /health, mount the Better Auth endpoints, and
        # 401 unauthenticated API requests (the session middleware, not the
        # selfhost passthrough).
        run: |
          docker run -d --name lector-cloud -p 3459:3457 \
            -e LECTOR_MODE=cloud -e BETTER_AUTH_SECRET=ci-boot-check-secret lector:e2e
          for i in $(seq 1 30); do
            BODY=$(curl -fsS http://localhost:3459/health 2>/dev/null) && break
            sleep 2
          done
          echo "health: $BODY"
          VOCAB_CODE=$(curl -s -o /dev/null -w '%{http_code}' "http://localhost:3459/api/vocab?language=af")
          AUTH_CODE=$(curl -s -o /dev/null -w '%{http_code}' -X POST "http://localhost:3459/api/auth/sign-in/email" \
            -H 'Content-Type: application/json' -d '{"email":"nobody@example.com","password":"wrong"}')
          echo "unauthenticated /api/vocab: $VOCAB_CODE (want 401), /api/auth sign-in: $AUTH_CODE (want 401 from the engine, not 404)"
          docker rm -f lector-cloud
          echo "$BODY" | grep -q '"mode":"cloud"'
          [ "$VOCAB_CODE" = "401" ] && [ "$AUTH_CODE" = "401" ]

      - name: Cloud canary shape boots (external gate, #242)
        # cloud + LECTOR_CLOUD_GATE=external is the deploy/cloud/ canary shape
        # (an authenticating gateway fronts the app). It must boot and report
        # its mode via /health so the deployed canary can be smoke-checked.
        run: |
          docker run -d --name lector-canary -p 3458:3457 \
            -e LECTOR_MODE=cloud -e LECTOR_CLOUD_GATE=external lector:e2e
          for i in $(seq 1 30); do
            BODY=$(curl -fsS http://localhost:3458/health 2>/dev/null) && break
            sleep 2
          done
          echo "health: $BODY"
          docker rm -f lector-canary
          echo "$BODY" | grep -q '"mode":"cloud"'

      - name: Start container
        # No volume mount: /app/data starts empty, matching the fresh DB the
        # dev-mode webServer guarantees. Container :3000 maps to host :3456 (the
        # UI origin the specs hardcode); :3457 maps to host :3457 (the Hono API —
        # the browser client and the specs' page.request calls hit it directly
        # now that the Next /api proxy is gone, #188). host-gateway lets the
        # in-container Bun API reach test stubs on the runner (lmstudio-chat.spec.ts).
        run: |
          docker run -d --name lector-e2e -p 3456:3000 -p 3457:3457 \
            --add-host=host.docker.internal:host-gateway lector:e2e
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Wait for app
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:3456 > /dev/null; then exit 0; fi
            sleep 2
          done
          echo "App did not become ready in 60s" >&2
          docker logs lector-e2e
          exit 1
      - name: Run e2e suite against the image
        run: E2E_EXTERNAL_SERVER=1 npm run test:e2e
      - name: Dump container logs
        if: failure()
        run: docker logs lector-e2e
      - uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-docker
          path: playwright-report/
          retention-days: 7
