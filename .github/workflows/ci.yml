name: CI

on:
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build

  e2e-tests:
    runs-on: ubuntu-latest
    needs: [build]
    # Pinned to the same release the Dockerfile uses. Bump together when a new
    # dict release is published via scripts/release-dict.sh.
    env:
      DICT_VERSION: dict-2026-06-06
      DICT_SHA256: 652df8d15e0678ead3b25ce0a021776d428256673df15b16e3e04cfe9b284a78
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - uses: oven-sh/setup-bun@v2
      - run: npm ci
      - run: cd api && bun install
      - name: Fetch on-device dictionary
        # The dictionary is gitignored — it ships in the Docker image. For CI
        # the dev server needs a copy at data/dictionary-af.db so e2e tests
        # that assert the "on-device" lookup path actually find a hit.
        run: |
          mkdir -p data
          curl -fL --retry 3 \
            "https://github.com/heuwels/lector/releases/download/${DICT_VERSION}/dictionary-af.db" \
            -o data/dictionary-af.db
          echo "${DICT_SHA256}  data/dictionary-af.db" | sha256sum -c -
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
