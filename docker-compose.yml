services:
  afrikaans-reader:
    image: registry.home.lukeboyle.com/afrikaans-reader:latest
    container_name: afrikaans-reader
    restart: unless-stopped
    ports:
      - "3400:3000"
    environment:
      - NODE_ENV=production
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
